{% extends 'base/menu_bibliotecario.html' %}

{% block main_content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8 text-center">
            <div class="card shadow">
                <div class="card-body py-5">
                    <i class="bi bi-tools" style="font-size: 80px; color: #6c757d;"></i>
                    <h2 class="mt-3">{{ titulo }}</h2>
                    <p class="text-muted lead">{{ mensaje }}</p>
                    <div class="progress mb-4" style="height: 10px;">
                        <div class="progress-bar bg-info progress-bar-striped progress-bar-animated" 
                             style="width: 65%"></div>
                    </div>
                    <p class="text-muted">Esta funcionalidad está en desarrollo</p>
                    <a href="{% url 'dashboard_bibliotecario' %}" class="btn btn-primary mt-3">
                        <i class="bi bi-arrow-left"></i> Volver al Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
